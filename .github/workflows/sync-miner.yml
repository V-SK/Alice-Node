name: Sync Miner to Download Server

on:
  push:
    branches: [main]
    paths:
      - 'miner/**'
      - 'src/**'
      - 'core/**'
      - 'alice_node.py'
      - 'requirements.txt'
      - 'start_mining.sh'
      - 'install.sh'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build miner tarball
        run: |
          VERSION=$(date +%Y%m%d-%H%M)
          
          # Create tarball with the same structure miners expect
          tar czf alice-miner-latest.tar.gz \
            --transform 's,^,alice-miner/,' \
            alice_node.py \
            miner/ \
            core/ \
            src/ \
            requirements.txt \
            start_mining.sh \
            install.sh
          
          # Generate checksum
          sha256sum alice-miner-latest.tar.gz > alice-miner-latest.tar.gz.sha256
          
          echo "Built tarball: $(ls -lh alice-miner-latest.tar.gz)"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Deploy to download server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DL_SERVER_HOST }}
          username: root
          key: ${{ secrets.DL_SERVER_SSH_KEY }}
          source: "alice-miner-latest.tar.gz,alice-miner-latest.tar.gz.sha256"
          target: "/data/models/miner/"
          overwrite: true

      - name: Sync individual files
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DL_SERVER_HOST }}
          username: root
          key: ${{ secrets.DL_SERVER_SSH_KEY }}
          script: |
            echo "✅ Miner package synced at $(date)"
            ls -lh /data/models/miner/alice-miner-latest.tar.gz
            
            echo "Sync complete"
